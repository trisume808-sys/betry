<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#050508" />
    <title>零点漂移</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #050508;
        color: #e4e4e7;
        overflow: hidden;
        touch-action: none;
      }

      #wrap {
        position: fixed;
        inset: 0;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }

      .link {
        position: fixed;
        right: 12px;
        top: 12px;
        z-index: 60;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(10, 10, 18, 0.62);
        color: rgba(52, 211, 153, 0.95);
        text-decoration: none;
        font-size: 12px;
        user-select: none;
      }

      .link.tutorial {
        left: 12px;
        right: auto;
        border: 0;
        cursor: pointer;
      }

      #tutorialOverlay[hidden] {
        display: none;
      }

      #tutorialOverlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      #tutorialBackdrop {
        position: absolute;
        inset: 0;
        border: 0;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(10px);
        cursor: pointer;
      }

      #tutorialPanel {
        position: relative;
        width: min(560px, 100%);
        max-height: 78vh;
        overflow: auto;
        border-radius: 18px;
        border: 1px solid rgba(63, 63, 70, 0.9);
        background: rgba(10, 10, 18, 0.92);
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
        padding: 14px 14px calc(14px + env(safe-area-inset-bottom));
      }

      #tutorialHeader {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(39, 39, 42, 0.9);
      }

      #tutorialTitle {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      #tutorialSub {
        margin-top: 4px;
        font-size: 11px;
        color: rgba(161, 161, 170, 0.95);
        line-height: 1.35;
      }

      #tutorialClose {
        border: 0;
        border-radius: 12px;
        background: rgba(24, 24, 27, 0.9);
        color: rgba(244, 244, 245, 0.95);
        font-size: 12px;
        padding: 8px 10px;
        cursor: pointer;
        user-select: none;
      }

      #tutorialClose:hover {
        background: rgba(39, 39, 42, 0.9);
      }

      .tutorialSection {
        margin-top: 12px;
      }

      .tutorialH {
        font-size: 12px;
        font-weight: 700;
        color: rgba(244, 244, 245, 0.95);
      }

      .tutorialP {
        margin-top: 6px;
        font-size: 12px;
        line-height: 1.6;
        color: rgba(212, 212, 216, 0.95);
      }

      .tutorialUl {
        margin: 6px 0 0 0;
        padding-left: 18px;
        color: rgba(212, 212, 216, 0.95);
        font-size: 12px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <button class="link tutorial" id="tutorialOpen" type="button">教程</button>
    <div id="tutorialOverlay" hidden>
      <button id="tutorialBackdrop" type="button" aria-label="关闭教程"></button>
      <div id="tutorialPanel" role="dialog" aria-modal="true">
        <div id="tutorialHeader">
          <div>
            <div id="tutorialTitle">游戏教程</div>
            <div id="tutorialSub">看完就会玩的超简版</div>
          </div>
          <button id="tutorialClose" type="button">关闭</button>
        </div>
        <div class="tutorialSection">
          <div class="tutorialH">怎么玩</div>
          <ul class="tutorialUl">
            <li>倾斜手机像方向盘一样转向。</li>
            <li>按住画面左右拖动：临时用手指转向（适合传感器不好用时兜底）。</li>
            <li>尽量别出赛道，出赛道会变慢。</li>
          </ul>
        </div>
        <div class="tutorialSection">
          <div class="tutorialH">没反应怎么办</div>
          <ul class="tutorialUl">
            <li>先试试“按住画面左右拖动”，确认游戏能动。</li>
            <li>如果要用传感器：用支持的浏览器打开，并在站点权限里允许“运动与传感器”。</li>
          </ul>
        </div>
        <div class="tutorialSection">
          <div class="tutorialH">小技巧</div>
          <ul class="tutorialUl">
            <li>手机竖屏更稳。</li>
            <li>想“回正”：把手机摆正后再继续倾斜。</li>
          </ul>
        </div>
      </div>
    </div>
    <div id="wrap">
      <canvas id="game"></canvas>
    </div>
    <script type="module">
      const overlay = document.getElementById("tutorialOverlay");
      const openBtn = document.getElementById("tutorialOpen");
      const closeBtn = document.getElementById("tutorialClose");
      const backdrop = document.getElementById("tutorialBackdrop");

      const open = () => {
        overlay.hidden = false;
      };

      const close = () => {
        overlay.hidden = true;
      };

      openBtn?.addEventListener("click", open);
      closeBtn?.addEventListener("click", close);
      backdrop?.addEventListener("click", close);
      window.addEventListener("keydown", (e) => {
        if (e.key === "Escape") close();
      });
    </script>
    <script type="module" src="./main.js?v=20260517-15"></script>
  </body>
</html>
