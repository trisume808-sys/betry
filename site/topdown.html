<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#050508" />
    <title>Top-Down Canvas Demo</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #050508;
        color: #e4e4e7;
        overflow: hidden;
        touch-action: none;
        font-family: ui-sans-serif, system-ui;
      }
      #wrap {
        position: fixed;
        inset: 0;
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }
      .hud {
        position: fixed;
        left: 12px;
        top: 12px;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(10, 10, 18, 0.62);
        backdrop-filter: blur(10px);
        font-size: 12px;
        line-height: 1.35;
        user-select: none;
        pointer-events: none;
      }
      .back {
        position: fixed;
        right: 12px;
        top: 12px;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(10, 10, 18, 0.62);
        color: rgba(52, 211, 153, 0.95);
        text-decoration: none;
        font-size: 12px;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <a class="back" href="./index.html">返回</a>
    <div class="hud">WASD/方向键，或按住拖动（按住=加速）</div>
    <div id="wrap">
      <canvas id="game"></canvas>
    </div>
    <script type="module" src="./topdown.js?v=20260517-1"></script>
  </body>
</html>
