<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RACE Poster Preview</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #050612;
      }
      .wrap {
        height: 100%;
        display: grid;
        place-items: center;
      }
      .frame {
        height: 96vh;
        max-width: 96vw;
        aspect-ratio: 2 / 5;
        border: 1px solid rgba(160, 180, 255, 0.18);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.55);
      }
      object {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="frame">
        <object data="/poster.svg" type="image/svg+xml"></object>
      </div>
    </div>
  </body>
</html>
